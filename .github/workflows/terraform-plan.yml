name: Terraform Plan
on:
  workflow_call:
    inputs:
      module_name:
        required: true
        type: string
    secrets:
      TF_API_TOKEN:
        required: true
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
permissions:
  id-token: write
  contents: read
jobs:
  terraform-plan:
    runs-on: self-hosted
    container:
      # Official Image
      # https://hub.docker.com/r/hashicorp/terraform
      image: hashicorp/terraform:1.13.0
      options: --user 1000:1000
    defaults:
      run:
        shell: sh
    env:
      TF_IN_AUTOMATION: true
      TF_INPUT: false
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Terraform Version
        run: terraform version

      - name: Terraform Init and Plan
        run: |
          echo "${{ inputs.module_name }}" | tr ',' '\n' | while IFS= read -r module; do
            module=$(echo "$module" | tr -d ' ')
            echo "--------------------------------------------"
            echo ">>> Processing module: $module"
            echo "--------------------------------------------"

            terraform -chdir="${module}/example" init \
              -input=false \
              -no-color

            terraform -chdir="${module}/example" plan \
              -input=false \
              -no-color \
              -out=tfplan

            terraform -chdir="${module}/example" show \
              -json tfplan > "${module}/example/tfplan.json"
          done

      - name: Upload Plans
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.module_name }}
          path: |
            **/tfplan
            **/tfplan.json

      - name: Workflow Summary
        if: always()
        run: |
          {
            echo "# Terraform Plan"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Modules | ${{ inputs.module_name }} |"
            echo "| Result | ${{ job.status }} |"
          } >> $GITHUB_STEP_SUMMARY