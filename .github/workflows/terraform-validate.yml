name: Terraform Validate

on:
  workflow_call:

    inputs:

      module_name:
        required: true
        type: string
        # Supports single or comma-separated module names
        # e.g. "resource-group" or "resource-group,virtual-network"

    secrets:

      TF_API_TOKEN:
        required: true

permissions:
  contents: read
  id-token: write

jobs:

  validate:

    runs-on: self-hosted

    container:

      # Official Image
      # https://hub.docker.com/r/hashicorp/terraform
      image: hashicorp/terraform:1.13.0
      options: --user 1000:1000

    defaults:

      run:
        shell: sh

    env:

      TF_IN_AUTOMATION: true
      TF_INPUT: false
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Terraform Version
        run: terraform version

      - name: Terraform Init and Validate

        run: |

          echo "${{ inputs.module_name }}" | tr ',' '\n' | while IFS= read -r module; do
            module=$(echo "$module" | tr -d ' ')
            echo "--------------------------------------------"
            echo ">>> Processing module: $module"
            echo "--------------------------------------------"

            terraform -chdir="${module}/example" init \
              -input=false \
              -no-color

            terraform -chdir="${module}/example" validate -no-color
          done

      - name: Workflow Summary

        if: always()

        run: |

          {
            echo "# Terraform Validate"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Modules | ${{ inputs.module_name }} |"
            echo "| Result | ${{ job.status }} |"
          } >> $GITHUB_STEP_SUMMARY