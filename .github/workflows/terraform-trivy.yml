name: Terraform Trivy

on:
  workflow_call:

    inputs:

      module_name:
        required: true
        type: string
        # Supports single or comma-separated module names
        # e.g. "resource-group" or "resource-group,virtual-network"

permissions:
  contents: read
  id-token: write

jobs:

  trivy:

    runs-on: self-hosted

    container:

      # Official Image
      # https://hub.docker.com/r/aquasec/trivy
      image: aquasec/trivy:0.71.2
      options: --user 1000:1000

    defaults:

      run:
        shell: sh

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Trivy Version
        run: trivy version

      - name: Terraform Misconfiguration Scan

        run: |

          echo "${{ inputs.module_name }}" | tr ',' '\n' | while IFS= read -r module; do
            module=$(echo "$module" | tr -d ' ')
            echo "--------------------------------------------"
            echo ">>> Scanning module: $module"
            echo "--------------------------------------------"

            trivy config \
              --severity HIGH,CRITICAL \
              --exit-code 1 \
              --skip-policy-update \
              --quiet \
              "${module}/example"
          done

      - name: Workflow Summary

        if: always()

        run: |

          {
            echo "# Terraform Trivy"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Modules | ${{ inputs.module_name }} |"
            echo "| Scanner | Trivy |"
            echo "| Severity | HIGH, CRITICAL |"
            echo "| Result | ${{ job.status }} |"
          } >> $GITHUB_STEP_SUMMARY