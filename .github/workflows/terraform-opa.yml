name: Terraform OPA

on:
  workflow_call:

    inputs:
      module_name:
        required: true
        type: string

    secrets:
      GH_PAT:
        required: true

permissions:
  contents: read

jobs:

  opa:

    runs-on: self-hosted

    container:

      # Official Image
      # https://hub.docker.com/r/openpolicyagent/opa
      # NOTE: only the "-debug" variant ships with a shell (/bin/sh).
      # All other OPA image variants (default, -static, -rootless) have
      # NO shell at all, which breaks any `run:` step in this job.
      # 1.7.1-debug does not exist on Docker Hub (old version, debug
      # builds aren't kept for older releases) — using 1.16.2-debug,
      # which is confirmed to exist.
      image: openpolicyagent/opa:1.16.2-debug
      options: --user 1000:1000

    defaults:
      run:
        shell: sh

    steps:

      - name: Checkout Infrastructure Repository
        uses: actions/checkout@v4

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ inputs.module_name }}
          path: artifact

      - name: Checkout OPA Policies
        uses: actions/checkout@v4
        with:
          repository: hcl-amit/Opa-repo
          ref: main
          token: ${{ secrets.GH_PAT }}
          path: opa-policy

      - name: Evaluate Policies Per Module
        run: |
          echo "${{ inputs.module_name }}" | tr ',' '\n' | while IFS= read -r module; do
            module=$(echo "$module" | tr -d ' ')
            echo "--------------------------------------------"
            echo ">>> Processing module: $module"
            echo "--------------------------------------------"

            case "$module" in
              virtual-network) policy_file="vnet.rego.txt" ;;
              subnet)           policy_file="subnet.rego.txt" ;;
              public-ip)        policy_file="public-ip.rego.txt" ;;
              *)
                echo "No policy mapping found for module: $module"
                exit 1
                ;;
            esac

            src="opa-policy/opa-policies/networking-policies/${policy_file}"

            if [ ! -f "$src" ]; then
              echo "Policy file not found: $src"
              exit 1
            fi

            # OPA only recognizes .rego extension, source files are .rego.txt
            cp "$src" "./${module}-policy.rego"

            opa eval \
              --format pretty \
              --data "./${module}-policy.rego" \
              --input "artifact/${module}/example/tfplan.json" \
              "data.terraform.deny"
          done

      - name: Workflow Summary

        if: always()

        run: |

          {

            echo "# OPA Policy Check"

            echo ""

            echo "| Item | Value |"

            echo "|------|-------|"

            echo "| Modules | ${{ inputs.module_name }} |"

            echo "| Result | ${{ job.status }} |"

          } >> $GITHUB_STEP_SUMMARY