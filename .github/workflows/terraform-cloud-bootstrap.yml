name: Terraform Cloud Bootstrap

on:
  workflow_call:

    inputs:

      organization:
        required: true
        type: string

      workspace_name:
        required: true
        type: string

      module_name:
        required: true
        type: string

    secrets:

      TF_API_TOKEN:
        required: true

      AZURE_CLIENT_ID:
        required: true

      AZURE_TENANT_ID:
        required: true

      AZURE_SUBSCRIPTION_ID:
        required: true

permissions:
  contents: read
  id-token: write

jobs:

  bootstrap:

    runs-on: self-hosted

    timeout-minutes: 20

    container:

      # https://hub.docker.com/_/ubuntu
      image: ubuntu:24.04

    env:

      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}

    steps:

      - name: Install Packages
        run: |
          apt-get update
          apt-get install -y \
            wget \
            unzip \
            curl \
            git \
            jq

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Terraform
        run: |

          TERRAFORM_VERSION=1.13.0

          wget https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_linux_amd64.zip

          unzip terraform_${TERRAFORM_VERSION}_linux_amd64.zip

          mv terraform /usr/local/bin/

          terraform version

      - name: Terraform Init

        working-directory: terraform-cloud

        run: |

          terraform init -input=false

      - name: Terraform Validate

        working-directory: terraform-cloud

        run: terraform validate

      - name: Check Workspace

        id: workspace

        shell: bash

        run: |

          STATUS=$(curl -s \
            -o response.json \
            -w "%{http_code}" \
            -H "Authorization: Bearer $TF_TOKEN_app_terraform_io" \
            -H "Content-Type: application/vnd.api+json" \
            https://app.terraform.io/api/v2/organizations/${{ inputs.organization }}/workspaces/${{ inputs.workspace_name }})

          if [ "$STATUS" = "200" ]; then

            echo "exists=true" >> $GITHUB_OUTPUT

          elif [ "$STATUS" = "404" ]; then

            echo "exists=false" >> $GITHUB_OUTPUT

          else

            cat response.json

            exit 1

          fi

      - name: Terraform Plan

        if: steps.workspace.outputs.exists == 'false'

        working-directory: terraform-cloud

        run: |

          terraform plan \
            -input=false \
            -out=tfplan \
            -var="tfe_token=${{ secrets.TF_API_TOKEN }}" \
            -var="organization=${{ inputs.organization }}" \
            -var="workspace_name=${{ inputs.workspace_name }}" \
            -var="azure_client_id=${{ secrets.AZURE_CLIENT_ID }}" \
            -var="azure_tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
            -var="azure_subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      - name: Terraform Apply

        if: steps.workspace.outputs.exists == 'false'

        working-directory: terraform-cloud

        run: |

          terraform apply \
            -input=false \
            -auto-approve \
            tfplan

      - name: Summary

        if: always()

        shell: bash

        run: |

          {

            echo "# Terraform Cloud Bootstrap"

            echo ""

            echo "| Item | Value |"

            echo "|------|-------|"

            echo "| Organization | ${{ inputs.organization }} |"

            echo "| Workspace | ${{ inputs.workspace_name }} |"

            echo "| Workspace Exists | ${{ steps.workspace.outputs.exists }} |"

            echo "| Result | ${{ job.status }} |"

          } >> $GITHUB_STEP_SUMMARY